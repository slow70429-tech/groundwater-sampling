<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>地下水採樣助手 V2.8</title>
<meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh;padding:10px}
.app{max-width:1120px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:8px 0 10px}
h1{font-size:28px;margin:0;font-weight:950}.badge{background:#022c22;color:#86efac;border:1px solid #166534;border-radius:999px;padding:6px 12px;font-size:14px;font-weight:900}
.panel{background:#111827;border:1px solid #334155;border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:0 8px 18px rgba(0,0,0,.22)}
h2{font-size:22px;color:#7dd3fc;margin:0 0 12px;font-weight:950}.inputGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{display:block;font-size:15px;font-weight:900;color:#cbd5e1;margin-bottom:5px}input{width:100%;font-size:28px;padding:10px 12px;border-radius:14px;border:2px solid #475569;background:#020617;color:#fff;outline:none}input:focus{border-color:#38bdf8}
.diaRow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.diaBtn,button{height:56px;border:0;border-radius:14px;background:#334155;color:#fff;font-size:20px;font-weight:950;width:100%}.diaBtn{border:2px solid #334155;background:#020617;color:#e2e8f0}.diaBtn.active{border-color:#38bdf8;color:#fde68a;background:#0b1220}
.mainGrid{display:grid;grid-template-columns:.9fr 1.1fr;gap:10px;align-items:start}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.card{background:#0b1220;border:1px solid #334155;border-radius:16px;padding:12px;min-height:88px}.card .k{font-size:15px;color:#cbd5e1;font-weight:900;margin-bottom:7px}.card .v{font-size:34px;font-weight:950}.card .u{font-size:18px;color:#94a3b8;margin-left:5px}.purge{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.purge .total{grid-column:1/3}.v2{color:#86efac}.v05{color:#93c5fd}.v3{color:#fdba74}
.wellBox{background:#0b1220;border:1px solid #334155;border-radius:16px;padding:12px}.wellTitle{font-size:22px;font-weight:950;color:#7dd3fc;margin-bottom:8px}.wellWrap{height:620px;position:relative;background:#020617;border:1px solid #334155;border-radius:16px;overflow:hidden}
.wellLine{position:absolute;left:34%;top:24px;bottom:24px;width:94px;border:7px solid #64748b;border-radius:42px;background:#07111f;overflow:hidden}.water{position:absolute;left:calc(34% - 40px);width:80px;background:rgba(56,189,248,.40);border-top:4px solid #38bdf8;display:none}.screen{position:absolute;left:calc(34% - 45px);width:90px;border:4px solid #f59e0b;border-radius:12px;background:repeating-linear-gradient(0deg,rgba(148,163,184,.55) 0 6px,rgba(71,85,105,.45) 6px 12px);display:none}.sampleLine,.preWaterLine,.postWaterLine{position:absolute;left:calc(34% - 58px);width:116px;border-top:5px solid;display:none;z-index:5}.sampleLine{border-color:#f472b6}.preWaterLine{border-color:#4ade80}.postWaterLine{border-color:#38bdf8}
.marker{position:absolute;left:calc(34% + 72px);right:8px;display:flex;align-items:center;gap:8px;font-weight:900;font-size:15px;min-height:30px;padding:4px 7px;border-radius:8px;background:rgba(2,6,23,.82);transform:translateY(-50%);z-index:10}.marker:before{content:"";width:34px;height:3px;background:#94a3b8;flex:none}.topLbl{top:4%;transform:none}.topLbl:before,.bottomLbl:before{background:#94a3b8}.preLbl{color:#86efac}.preLbl:before{background:#4ade80}.postLbl{color:#7dd3fc}.postLbl:before{background:#38bdf8}.screenLbl{color:#fdba74}.screenLbl:before{background:#f59e0b}.sampleLbl{color:#f9a8d4}.sampleLbl:before{background:#f472b6}.bottomLbl{top:96%}
.warn{color:#fca5a5;font-weight:900;font-size:14px;margin-top:8px;min-height:20px}.summary{background:#0b1220;border:1px solid #334155;border-radius:14px;padding:12px;font-size:15px;line-height:1.65}.clearWrap{align-self:end}
@media(max-width:820px){body{padding:5px}.app{max-width:100%;margin:0}.header{margin:2px 0 5px}h1{font-size:18px}.badge{font-size:11px;padding:4px 8px}.panel{padding:7px;margin-bottom:6px;border-radius:14px}h2{font-size:16px;margin:0 0 6px}label{font-size:12px;margin-bottom:3px}.inputGrid{grid-template-columns:1fr 1fr 1fr;gap:5px}input{font-size:18px;padding:6px 7px;border-radius:10px}.diaRow{gap:5px}.diaBtn,button{height:38px;font-size:15px;border-radius:10px}.mainGrid{grid-template-columns:.88fr 1.12fr;gap:6px}.wellBox{padding:6px;border-radius:14px}.wellTitle{font-size:14px;margin-bottom:4px}.wellWrap{height:390px;border-radius:12px}.wellLine{left:28%;top:18px;bottom:18px;width:52px;border-width:3px;border-radius:16px}.water{left:calc(28% - 23px);width:46px}.screen{left:calc(28% - 27px);width:54px;border-width:2px;border-radius:10px}.sampleLine,.preWaterLine,.postWaterLine{left:calc(28% - 38px);width:76px;border-top-width:4px}.marker{left:calc(28% + 44px);right:3px;font-size:11px;gap:4px;min-height:24px;padding:2px 4px;border-radius:6px}.marker:before{width:16px;height:2px}.cards{grid-template-columns:1fr 1fr;gap:5px}.card{padding:6px;min-height:56px;border-radius:12px}.card .k{font-size:11px;margin-bottom:3px}.card .v{font-size:17px}.card .u{font-size:12px;margin-left:3px}.purge{grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}.purge .total{grid-column:1/3}.warn{font-size:11px;margin-top:4px;min-height:14px}.summary{font-size:12px;line-height:1.35;padding:7px;border-radius:12px}}
@media(max-width:430px){.inputGrid{grid-template-columns:1fr 1fr;gap:5px}.clearWrap{grid-column:1/3}.mainGrid{grid-template-columns:1fr 1fr;gap:5px}.wellWrap{height:360px}.wellLine{left:24%;width:46px}.water{left:calc(24% - 20px);width:40px}.screen{left:calc(24% - 24px);width:48px}.sampleLine,.preWaterLine,.postWaterLine{left:calc(24% - 34px);width:68px}.marker{left:calc(24% + 35px);font-size:10px;gap:3px;padding:2px 3px}.marker:before{width:12px}.cards,.purge{grid-template-columns:1fr}.purge .total{grid-column:auto}.card{min-height:48px}.card .v{font-size:16px}}
</style>
</head>
<body>
<main class="app">
<div class="header"><h1>地下水採樣助手 V2.8</h1><div class="badge">手機一頁式</div></div>
<section class="panel"><h2>基本資料</h2><div class="inputGrid">
<div><label>井徑</label><div class="diaRow"><button class="diaBtn active" id="dia2" type="button">2 吋</button><button class="diaBtn" id="dia4" type="button">4 吋</button></div></div>
<div><label for="waterLevel">洗井前水位深度 m</label><input id="waterLevel" type="number" inputmode="decimal" step="0.001" placeholder="12.000"></div>
<div><label for="wellDepth">井深 m</label><input id="wellDepth" type="number" inputmode="decimal" step="0.001" placeholder="30.000"></div>
<div><label for="postWaterLevel">洗井後水位深度 m</label><input id="postWaterLevel" type="number" inputmode="decimal" step="0.001" placeholder="例如 10.505"></div>
<div><label for="screenTop">井篩上緣 m</label><input id="screenTop" type="number" inputmode="decimal" step="0.001" placeholder="18.000"></div>
<div><label for="screenBottom">井篩下緣 m</label><input id="screenBottom" type="number" inputmode="decimal" step="0.001" placeholder="28.000"></div>
<div class="clearWrap"><label>&nbsp;</label><button id="clearBtn" type="button">清除</button></div>
</div></section>
<section class="mainGrid">
<section class="panel"><div class="wellBox"><div class="wellTitle">直式井身圖</div><div class="wellWrap">
<div class="wellLine"></div><div class="water" id="waterArea"></div><div class="screen" id="screenArea"></div><div class="preWaterLine" id="preWaterLine"></div><div class="postWaterLine" id="postWaterLine"></div><div class="sampleLine" id="sampleLine"></div>
<div class="marker topLbl">井口 0.000 m</div><div class="marker preLbl" id="preWaterMark">採樣前水位 —</div><div class="marker postLbl" id="postWaterMark">洗井後水位 —</div><div class="marker screenLbl" id="screenTopMark">井篩上緣 —</div><div class="marker sampleLbl" id="sampleMark">採樣深度 —</div><div class="marker screenLbl" id="screenBottomMark">井篩下緣 —</div><div class="marker bottomLbl" id="bottomMark">井底 —</div>
</div></div></section>
<section class="panel"><h2>自動計算</h2><div class="cards">
<div class="card"><div class="k">水柱高度</div><div class="v" id="waterColumn">— <span class="u">m</span></div></div><div class="card"><div class="k">井水體積</div><div class="v" id="wellVolume">— <span class="u">L</span></div></div><div class="card"><div class="k">井篩長度</div><div class="v" id="screenLen">— <span class="u">m</span></div></div><div class="card"><div class="k">最大允許洩降（井篩長度 1/8）</div><div class="v" id="maxDrawdown">— <span class="u">m</span></div></div><div class="card"><div class="k">實際洩降深度</div><div class="v" id="drawdownDepth">— <span class="u">m</span></div></div><div class="card"><div class="k">洩降體積</div><div class="v" id="drawdownVolume">— <span class="u">L</span></div></div><div class="card"><div class="k">建議採樣深度</div><div class="v" id="screenMid">— <span class="u">m</span></div></div>
</div><h2 style="margin-top:14px">貝勒管洗井體積</h2><div class="purge"><div class="card"><div class="k">井水體積</div><div class="v" id="pv1">— <span class="u">L</span></div></div><div class="card"><div class="k">第一次洗井（2 倍）</div><div class="v v2" id="pv2">— <span class="u">L</span></div></div><div class="card"><div class="k">第二次洗井（0.5 倍）</div><div class="v v05" id="pv05a">— <span class="u">L</span></div></div><div class="card"><div class="k">第三次洗井（0.5 倍）</div><div class="v v05" id="pv05b">— <span class="u">L</span></div></div><div class="card total"><div class="k">總洗井體積（3 倍）</div><div class="v v3" id="pv3">— <span class="u">L</span></div></div></div><div class="warn" id="warn"></div></section>
</section>
<section class="panel"><h2>摘要</h2><div class="summary" id="summary">輸入資料後，自動產生地下水採樣摘要。</div></section>
</main>
<script>
const $=id=>document.getElementById(id);let dia=2;const rate={2:2,4:8.1};
function n(id){return parseFloat($(id).value)}function ok(x){return Number.isFinite(x)&&x>=0}function f3(x){return Number.isFinite(x)?(Math.round(x*1000)/1000).toFixed(3):"—"}function fVol(x){if(!Number.isFinite(x))return"—";return(Math.round(x*10000)/10000).toFixed(4).replace(/\.0+$/,"").replace(/(\.\d*?)0+$/,"$1")}function fCeil(x){return Number.isFinite(x)?String(Math.ceil(x)):"—"}function setVal(id,val,unit,fmt=f3){$(id).innerHTML=(Number.isFinite(val)?fmt(val):"—")+` <span class="u">${unit}</span>`}function rawPct(depth,total){if(!Number.isFinite(depth)||!Number.isFinite(total)||total<=0)return null;return Math.max(4,Math.min(96,(depth/total)*100))}
function spreadPositions(list,minGap=7){const valid=list.filter(x=>x.p!==null).sort((a,b)=>a.p-b.p);for(let i=1;i<valid.length;i++)if(valid[i].p-valid[i-1].p<minGap)valid[i].p=valid[i-1].p+minGap;for(let i=valid.length-2;i>=0;i--){if(valid[i+1].p>96){const s=valid[i+1].p-96;for(let j=0;j<=i+1;j++)valid[j].p-=s}if(valid[i+1].p-valid[i].p<minGap)valid[i].p=valid[i+1].p-minGap}valid.forEach(x=>x.p=Math.max(4,Math.min(96,x.p)));return valid}
function setMarker(id,top,text){const el=$(id);el.textContent=text;if(top===null)el.style.display="none";else{el.style.display="flex";el.style.top=top+"%"}}
function setLine(id,p){const el=$(id);if(Number.isFinite(p)){el.style.display="block";el.style.top=p+"%"}else el.style.display="none"}
function calc(){const wd=n("wellDepth"),wl=n("waterLevel"),pwl=n("postWaterLevel"),st=n("screenTop"),sb=n("screenBottom");const validDepth=ok(wd)&&wd>0;const currentWater=ok(pwl)?pwl:wl;const wc=(validDepth&&ok(wl))?wd-wl:NaN;const sl=(ok(st)&&ok(sb))?sb-st:NaN;const mid=(ok(st)&&ok(sb))?(st+sb)/2:NaN;let sm=NaN,sampleRule="—";
if(validDepth&&ok(st)&&ok(sb)){if(ok(pwl)){if(pwl<=st){sm=mid;sampleRule="洗井後水位未低於井篩上緣，採井篩中點"}else{sm=pwl+(wd-pwl)/2;sampleRule="洗井後水位已進入井篩，採洗井後水位與井底中點"}}else if(ok(wl)){sm=wl<=st?mid:wl+(wd-wl)/2;sampleRule=wl<=st?"尚未輸入洗井後水位，暫採井篩中點":"尚未輸入洗井後水位，暫採原水位與井底中點"}}
const vol=(Number.isFinite(wc)&&wc>0)?wc*rate[dia]:NaN,drawdown=(ok(wl)&&ok(pwl))?pwl-wl:NaN,drawVol=Number.isFinite(drawdown)?Math.max(0,drawdown)*rate[dia]:NaN,maxDraw=(Number.isFinite(sl)&&sl>=0)?sl/8:NaN,drawOk=Number.isFinite(drawdown)&&Number.isFinite(maxDraw)?drawdown<=maxDraw:null;
setVal("waterColumn",wc,"m");setVal("wellVolume",vol,"L",fVol);setVal("screenLen",sl,"m");setVal("maxDrawdown",maxDraw,"m");setVal("drawdownDepth",drawdown,"m");setVal("drawdownVolume",drawVol,"L",fVol);setVal("screenMid",sm,"m");setVal("pv1",vol,"L",fVol);setVal("pv2",vol*2,"L",fCeil);setVal("pv05a",vol*.5,"L",fCeil);setVal("pv05b",vol*.5,"L",fCeil);setVal("pv3",vol*3,"L",fCeil);
let warns=[];if(Number.isFinite(wc)&&wc<0)warns.push("洗井前水位深度大於井深，請確認資料。");if(Number.isFinite(sl)&&sl<0)warns.push("井篩下緣小於井篩上緣，請確認資料。");if(ok(pwl)&&validDepth&&pwl>wd)warns.push("洗井後水位深度大於井深，請確認資料。");if(Number.isFinite(drawdown)&&drawdown<0)warns.push("洗井後水位比洗井前更淺，請確認輸入。");if(drawOk===false)warns.push("實際洩降超過井篩總長的 1/8，不符合限制。");$("warn").textContent=warns.join(" ");
const preRaw=rawPct(wl,wd),postRaw=rawPct(pwl,wd),spRaw=rawPct(st,wd),bpRaw=rawPct(sb,wd),mpRaw=rawPct(sm,wd);const positions=spreadPositions([{id:"preWaterMark",p:preRaw,text:Number.isFinite(wl)?"採樣前水位 "+f3(wl)+" m":"採樣前水位 —"},{id:"postWaterMark",p:postRaw,text:Number.isFinite(pwl)?"洗井後水位 "+f3(pwl)+" m":"洗井後水位 —"},{id:"screenTopMark",p:spRaw,text:Number.isFinite(st)?"井篩上緣 "+f3(st)+" m":"井篩上緣 —"},{id:"sampleMark",p:mpRaw,text:Number.isFinite(sm)?"採樣深度 "+f3(sm)+" m":"採樣深度 —"},{id:"screenBottomMark",p:bpRaw,text:Number.isFinite(sb)?"井篩下緣 "+f3(sb)+" m":"井篩下緣 —"},{id:"bottomMark",p:validDepth?96:null,text:validDepth?"井底 "+f3(wd)+" m":"井底 —"}],7);["preWaterMark","postWaterMark","screenTopMark","sampleMark","screenBottomMark","bottomMark"].forEach(id=>setMarker(id,null,""));positions.forEach(x=>setMarker(x.id,x.p,x.text));
const fillRaw=rawPct(currentWater,wd);if(validDepth&&Number.isFinite(fillRaw)){$("waterArea").style.display="block";$("waterArea").style.top=fillRaw+"%";$("waterArea").style.height=(96-fillRaw)+"%"}else $("waterArea").style.display="none";if(validDepth&&Number.isFinite(spRaw)&&Number.isFinite(bpRaw)){$("screenArea").style.display="block";$("screenArea").style.top=Math.min(spRaw,bpRaw)+"%";$("screenArea").style.height=Math.max(4,Math.abs(bpRaw-spRaw))+"%"}else $("screenArea").style.display="none";setLine("preWaterLine",preRaw);setLine("postWaterLine",postRaw);setLine("sampleLine",mpRaw);
$("summary").innerHTML=`井徑：<b>${dia} 吋</b>｜計算倍率：<b>×${rate[dia]}</b><br>洗井前水位：<b>${f3(wl)} m</b>｜井深：<b>${f3(wd)} m</b>｜洗井後水位：<b>${f3(pwl)} m</b><br>洩降深度：<b>${f3(drawdown)} m</b>｜洩降體積：<b>${fVol(drawVol)} L</b><br>井篩長度：<b>${f3(sl)} m</b>｜最大允許洩降：<b>${f3(maxDraw)} m</b><br>水柱高度：<b>${f3(wc)} m</b>｜井水體積：<b>${fVol(vol)} L</b><br>第一次洗井 2 倍：<b>${fCeil(vol*2)} L</b>｜第二次 0.5 倍：<b>${fCeil(vol*.5)} L</b>｜第三次 0.5 倍：<b>${fCeil(vol*.5)} L</b><br>總洗井體積 3 倍：<b>${fCeil(vol*3)} L</b>｜建議採樣深度：<b>${f3(sm)} m</b><br>採樣點規則：<b>${sampleRule}</b>`}
$("dia2").onclick=()=>{dia=2;$("dia2").classList.add("active");$("dia4").classList.remove("active");calc()};$("dia4").onclick=()=>{dia=4;$("dia4").classList.add("active");$("dia2").classList.remove("active");calc()};["wellDepth","waterLevel","postWaterLevel","screenTop","screenBottom"].forEach(id=>$(id).addEventListener("input",calc));$("clearBtn").onclick=()=>{["wellDepth","waterLevel","postWaterLevel","screenTop","screenBottom"].forEach(id=>$(id).value="");calc()};calc();
</script>
</body></html>
