<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>地下水採樣助手 V1</title>
<meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh;padding:10px}.app{max-width:980px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:6px 0 10px}h1{font-size:26px;margin:0;font-weight:950}.badge{background:#022c22;color:#86efac;border:1px solid #166534;border-radius:999px;padding:6px 12px;font-size:14px;font-weight:900}.panel{background:#111827;border:1px solid #334155;border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:0 8px 18px rgba(0,0,0,.2)}h2{font-size:22px;color:#7dd3fc;margin:0 0 12px;font-weight:950}.diam{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.diaBtn{height:54px;border:2px solid #334155;border-radius:14px;background:#020617;color:#e2e8f0;font-size:24px;font-weight:950}.diaBtn.active{border-color:#38bdf8;color:#7dd3fc;background:#082f49}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}label{display:block;font-size:16px;font-weight:900;color:#cbd5e1;margin-bottom:5px}input{width:100%;font-size:28px;padding:9px 11px;border-radius:13px;border:2px solid #475569;background:#020617;color:#fff;outline:none}input:focus{border-color:#38bdf8}.clear{margin-top:10px;height:48px;border:0;border-radius:13px;background:#334155;color:#fff;font-size:20px;font-weight:950;width:100%}.layout{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wellWrap{display:flex;gap:12px;align-items:stretch}.well{position:relative;width:130px;min-height:410px;background:#020617;border:2px solid #334155;border-radius:18px;overflow:hidden}.water{position:absolute;left:24px;right:24px;bottom:0;background:linear-gradient(180deg,rgba(56,189,248,.55),rgba(14,165,233,.2));border-top:3px solid #38bdf8}.screen{position:absolute;left:42px;right:42px;background:repeating-linear-gradient(0deg,#fbbf24 0,#fbbf24 7px,#92400e 7px,#92400e 12px);border-radius:6px;box-shadow:0 0 0 2px rgba(251,191,36,.25)}.sampleLine{position:absolute;left:14px;right:14px;border-top:3px solid #86efac}.markTxt{font-size:14px;line-height:1.55;color:#e2e8f0;flex:1}.markTxt b{color:#7dd3fc}.markTxt .samp{color:#86efac;font-weight:950}.resultGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:#0b1220;border:1px solid #334155;border-radius:16px;padding:12px}.card .k{font-size:15px;color:#cbd5e1;font-weight:900;margin-bottom:8px}.card .v{font-size:30px;font-weight:950}.card .u{font-size:18px;color:#cbd5e1;margin-left:4px}.purge{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.big{grid-column:1/-1}.note{font-size:14px;color:#fde68a;line-height:1.5;font-weight:800}.warn{color:#fecaca;font-weight:900}.summary{font-size:16px;line-height:1.7;color:#e2e8f0}.summary b{color:#7dd3fc}@media(max-width:760px){body{padding:8px}.header{margin-top:4px}h1{font-size:24px}.panel{padding:12px}.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}.resultGrid,.purge{grid-template-columns:1fr 1fr}.well{width:118px;min-height:360px}input{font-size:26px}.diaBtn{font-size:22px}}@media(max-width:430px){h1{font-size:22px}.badge{font-size:12px;padding:5px 9px}.grid{gap:8px}label{font-size:14px}input{font-size:24px;padding:8px}.card{padding:10px}.card .v{font-size:25px}.well{width:105px;min-height:330px}.markTxt{font-size:13px}.purge,.resultGrid{gap:8px}}
</style>
</head>
<body>
<main class="app">
  <div class="header"><h1>地下水採樣助手 V1</h1><div class="badge">一頁式</div></div>

  <section class="panel">
    <h2>基本資料</h2>
    <div class="diam">
      <button class="diaBtn active" id="dia2" type="button">2 吋</button>
      <button class="diaBtn" id="dia4" type="button">4 吋</button>
    </div>
    <div class="grid">
      <div><label for="wellDepth">井深 m</label><input id="wellDepth" type="number" inputmode="decimal" step="0.1" placeholder="30.0"></div>
      <div><label for="waterLevel">水位深度 m</label><input id="waterLevel" type="number" inputmode="decimal" step="0.1" placeholder="12.0"></div>
      <div><label for="screenTop">井篩上緣 m</label><input id="screenTop" type="number" inputmode="decimal" step="0.1" placeholder="18.0"></div>
      <div><label for="screenBottom">井篩下緣 m</label><input id="screenBottom" type="number" inputmode="decimal" step="0.1" placeholder="28.0"></div>
    </div>
    <button class="clear" id="clearBtn" type="button">清除</button>
  </section>

  <section class="layout">
    <section class="panel">
      <h2>井身圖</h2>
      <div class="wellWrap">
        <div class="well" id="wellBox">
          <div class="water" id="waterBox"></div>
          <div class="screen" id="screenBox"></div>
          <div class="sampleLine" id="sampleLine"></div>
        </div>
        <div class="markTxt" id="marks">輸入資料後自動標示井口、水位、井篩、採樣深度與井底。</div>
      </div>
    </section>

    <section class="panel">
      <h2>自動計算</h2>
      <div class="resultGrid">
        <div class="card"><div class="k">水柱高度</div><div class="v" id="waterHeight">— <span class="u">m</span></div></div>
        <div class="card"><div class="k">井水體積</div><div class="v" id="wellVol">— <span class="u">L</span></div></div>
        <div class="card"><div class="k">井篩長度</div><div class="v" id="screenLen">— <span class="u">m</span></div></div>
        <div class="card"><div class="k">井篩中點／採樣深度</div><div class="v" id="screenMid">— <span class="u">m</span></div></div>
      </div>
      <div class="note" id="note" style="margin-top:10px">2 吋：水柱高度 × 2；4 吋：水柱高度 × 8.1。</div>
    </section>
  </section>

  <section class="panel">
    <h2>貝勒管洗井體積</h2>
    <div class="purge">
      <div class="card"><div class="k">井水體積</div><div class="v" id="p0">— <span class="u">L</span></div></div>
      <div class="card"><div class="k">第一次洗井 2 倍</div><div class="v" id="p1">— <span class="u">L</span></div></div>
      <div class="card"><div class="k">第二次洗井 0.5 倍</div><div class="v" id="p2">— <span class="u">L</span></div></div>
      <div class="card"><div class="k">第三次洗井 0.5 倍</div><div class="v" id="p3">— <span class="u">L</span></div></div>
      <div class="card big"><div class="k">總洗井體積 3 倍</div><div class="v" id="pTotal">— <span class="u">L</span></div></div>
    </div>
  </section>

  <section class="panel"><div class="summary" id="summary">輸入井深、水位與井篩資料後，自動產生摘要。</div></section>
</main>
<script>
const $=id=>document.getElementById(id);let dia=2;
function n(id){return parseFloat($(id).value)}
function ok(x){return Number.isFinite(x)}
function f1(x){return ok(x)?(Math.round(x*10)/10).toFixed(1):'—'}
function pos(v,d){if(!ok(v)||!ok(d)||d<=0)return null;return Math.max(0,Math.min(100,(v/d)*100))}
function val(id,x,u=''){ $(id).innerHTML=`${f1(x)} <span class="u">${u}</span>`; }
function setDia(x){dia=x;$('dia2').classList.toggle('active',x===2);$('dia4').classList.toggle('active',x===4);calc()}
function calc(){
 const wd=n('wellDepth'), wl=n('waterLevel'), st=n('screenTop'), sb=n('screenBottom');
 const valid=ok(wd)&&ok(wl)&&wd>0&&wl>=0&&wl<=wd;
 const wh=valid?wd-wl:NaN; const factor=dia===2?2:8.1; const vol=valid?wh*factor:NaN;
 const sValid=ok(st)&&ok(sb)&&sb>st&&ok(wd)&&st>=0&&sb<=wd; const sl=sValid?sb-st:NaN; const sm=sValid?(st+sb)/2:NaN;
 val('waterHeight',wh,'m'); val('wellVol',vol,'L'); val('screenLen',sl,'m'); val('screenMid',sm,'m');
 val('p0',vol,'L'); val('p1',vol*2,'L'); val('p2',vol*.5,'L'); val('p3',vol*.5,'L'); val('pTotal',vol*3,'L');
 const wp=valid?pos(wl,wd):null, sp=sValid?pos(st,wd):null, bp=sValid?pos(sb,wd):null, mp=sValid?pos(sm,wd):null;
 $('waterBox').style.display=valid?'block':'none'; if(valid){$('waterBox').style.height=(100-wp)+'%'}
 $('screenBox').style.display=sValid?'block':'none'; if(sValid){$('screenBox').style.top=sp+'%';$('screenBox').style.height=Math.max(4,bp-sp)+'%'}
 $('sampleLine').style.display=sValid?'block':'none'; if(sValid){$('sampleLine').style.top=mp+'%'}
 let warn=''; if(ok(wd)&&ok(wl)&&wl>wd) warn='<div class="warn">水位深度大於井深，請確認輸入。</div>'; if(ok(st)&&ok(sb)&&sb<=st) warn='<div class="warn">井篩下緣需大於井篩上緣。</div>';
 $('marks').innerHTML = ok(wd)?`<b>井口</b>：0.0 m<br>${valid?`<b>水位</b>：${f1(wl)} m<br>`:''}${sValid?`<b>井篩上緣</b>：${f1(st)} m<br><b>井篩下緣</b>：${f1(sb)} m<br><span class="samp">採樣深度：${f1(sm)} m</span><br>`:''}<b>井底</b>：${f1(wd)} m${warn}`:'輸入資料後自動標示井口、水位、井篩、採樣深度與井底。';
 $('summary').innerHTML = valid?`<b>${dia} 吋井</b>｜水柱高度 ${f1(wh)} m｜井水體積 ${f1(vol)} L<br>第一次洗井 2倍：${f1(vol*2)} L｜第二次 0.5倍：${f1(vol*.5)} L｜第三次 0.5倍：${f1(vol*.5)} L｜總量 ${f1(vol*3)} L${sValid?`<br>井篩 ${f1(st)}–${f1(sb)} m｜井篩中點／建議採樣深度 ${f1(sm)} m`:''}`:'輸入井深、水位與井篩資料後，自動產生摘要。';
}
$('dia2').onclick=()=>setDia(2);$('dia4').onclick=()=>setDia(4);['wellDepth','waterLevel','screenTop','screenBottom'].forEach(id=>$(id).addEventListener('input',calc));
$('clearBtn').onclick=()=>{['wellDepth','waterLevel','screenTop','screenBottom'].forEach(id=>$(id).value='');calc()};calc();
</script>
</body></html>
