<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>地下水採樣助手 V1</title>
<meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
  background:#0f172a;color:#f8fafc;min-height:100vh;padding:10px;
}
.app{max-width:980px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:8px 0 10px}
h1{font-size:28px;margin:0;font-weight:950}
.badge{background:#022c22;color:#86efac;border:1px solid #166534;border-radius:999px;padding:6px 12px;font-size:14px;font-weight:900}
.panel{
  background:#111827;border:1px solid #334155;border-radius:18px;
  padding:14px;margin-bottom:10px;box-shadow:0 8px 18px rgba(0,0,0,.2);
}
h2{font-size:22px;color:#7dd3fc;margin:0 0 12px;font-weight:950}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{display:block;font-size:15px;font-weight:900;color:#cbd5e1;margin-bottom:5px}
input{
  width:100%;font-size:28px;padding:10px 12px;border-radius:14px;
  border:2px solid #475569;background:#020617;color:#fff;outline:none;
}
input:focus{border-color:#38bdf8}
.diaRow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.diaBtn{
  height:58px;border:2px solid #334155;border-radius:14px;background:#020617;color:#e2e8f0;
  font-size:22px;font-weight:950;
}
.diaBtn.active{border-color:#38bdf8;color:#fde68a;background:#0b1220}
button{
  height:54px;border:0;border-radius:14px;background:#334155;color:#fff;
  font-size:20px;font-weight:950;width:100%;
}
.mainGrid{display:grid;grid-template-columns:1.05fr .95fr;gap:10px}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.card{
  background:#0b1220;border:1px solid #334155;border-radius:16px;padding:12px;min-height:88px;
}
.card .k{font-size:14px;color:#cbd5e1;font-weight:900;margin-bottom:6px}
.card .v{font-size:28px;font-weight:950;color:#f8fafc}
.card .u{font-size:18px;color:#93a4b8;margin-left:5px}
.purge{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px
}
.purge .card:nth-child(5){grid-column:1/3}
.v2{color:#86efac!important}.v05{color:#93c5fd!important}.v3{color:#fdba74!important}

.wellBox{background:#0b1220;border:1px solid #334155;border-radius:18px;padding:12px}
.wellTitle{font-size:18px;font-weight:950;color:#7dd3fc;margin-bottom:8px}
.wellWrap{position:relative;height:520px;background:#020617;border:1px solid #334155;border-radius:16px;overflow:hidden}
.wellLine{position:absolute;left:46%;top:18px;bottom:18px;width:54px;border:3px solid #64748b;border-radius:18px;background:#050b16;transform:translateX(-50%)}
.water{position:absolute;left:calc(46% - 24px);width:48px;background:rgba(56,189,248,.32);border-top:3px solid #38bdf8}
.screen{position:absolute;left:calc(46% - 28px);width:56px;background:repeating-linear-gradient(0deg,#fdba74 0 7px,#92400e 7px 12px);border:2px solid #fdba74;border-radius:8px}
.sampleLine{position:absolute;left:calc(46% - 42px);width:84px;height:0;border-top:4px solid #86efac;display:none}
.marker{
  position:absolute;left:calc(46% + 42px);right:6px;transform:translateY(-50%);
  display:flex;align-items:center;gap:6px;font-size:14px;font-weight:900;color:#e2e8f0;line-height:1.2;
}
.marker:before{content:"";width:22px;height:2px;background:#94a3b8;flex:0 0 auto}
.marker.waterLbl{color:#7dd3fc}.marker.screenLbl{color:#fdba74}.marker.sampleLbl{color:#86efac}.marker.bottomLbl{color:#fca5a5}
.warn{font-size:14px;line-height:1.45;color:#fecaca;font-weight:850;margin-top:8px;min-height:20px}
.summary{
  font-size:16px;line-height:1.55;color:#e2e8f0;background:#0b1220;border:1px solid #334155;border-radius:16px;padding:12px;
}
.summary b{color:#7dd3fc}
.hidden{display:none!important}
@media(max-width:760px){
  body{padding:8px}
  h1{font-size:24px}
  .panel{padding:12px}
  .grid{grid-template-columns:1fr 1fr;gap:8px}
  .grid .clearWrap{grid-column:1/3}
  .mainGrid{grid-template-columns:1fr}
  input{font-size:24px;padding:9px 10px}
  .diaBtn{font-size:20px;height:50px}
  .cards{grid-template-columns:1fr 1fr}
  .card{padding:10px;min-height:78px}
  .card .v{font-size:24px}
  .wellWrap{height:460px}
}
@media(max-width:430px){
  .grid{grid-template-columns:1fr}
  .grid .clearWrap{grid-column:auto}
  .cards{grid-template-columns:1fr}
  .purge{grid-template-columns:1fr}
  .purge .card:nth-child(5){grid-column:auto}
}
</style>
</head>
<body>
<main class="app">
  <div class="header">
    <h1>地下水採樣助手 V1</h1>
    <div class="badge">完整功能版</div>
  </div>

  <section class="panel">
    <h2>基本資料</h2>
    <div class="grid">
      <div>
        <label>井徑</label>
        <div class="diaRow">
          <button class="diaBtn active" id="dia2" type="button">2 吋</button>
          <button class="diaBtn" id="dia4" type="button">4 吋</button>
        </div>
      </div>
      <div>
        <label for="wellDepth">井深 m</label>
        <input id="wellDepth" type="number" inputmode="decimal" step="0.1" placeholder="30.0">
      </div>
      <div>
        <label for="waterLevel">水位深度 m</label>
        <input id="waterLevel" type="number" inputmode="decimal" step="0.1" placeholder="12.0">
      </div>
      <div>
        <label for="screenTop">井篩上緣 m</label>
        <input id="screenTop" type="number" inputmode="decimal" step="0.1" placeholder="18.0">
      </div>
      <div>
        <label for="screenBottom">井篩下緣 m</label>
        <input id="screenBottom" type="number" inputmode="decimal" step="0.1" placeholder="28.0">
      </div>
      <div class="clearWrap">
        <label>&nbsp;</label>
        <button id="clearBtn" type="button">清除</button>
      </div>
    </div>
  </section>

  <section class="mainGrid">
    <section class="panel">
      <h2>自動計算</h2>
      <div class="cards">
        <div class="card"><div class="k">水柱高度</div><div class="v" id="waterColumn">— <span class="u">m</span></div></div>
        <div class="card"><div class="k">井水體積</div><div class="v" id="wellVolume">— <span class="u">L</span></div></div>
        <div class="card"><div class="k">井篩長度</div><div class="v" id="screenLen">— <span class="u">m</span></div></div>
        <div class="card"><div class="k">井篩中點 / 建議採樣深度</div><div class="v" id="screenMid">— <span class="u">m</span></div></div>
      </div>

      <h2 style="margin-top:14px">貝勒管洗井體積</h2>
      <div class="purge">
        <div class="card"><div class="k">井水體積</div><div class="v" id="pv1">— <span class="u">L</span></div></div>
        <div class="card"><div class="k">第一次洗井（2 倍）</div><div class="v v2" id="pv2">— <span class="u">L</span></div></div>
        <div class="card"><div class="k">第二次洗井（0.5 倍）</div><div class="v v05" id="pv05a">— <span class="u">L</span></div></div>
        <div class="card"><div class="k">第三次洗井（0.5 倍）</div><div class="v v05" id="pv05b">— <span class="u">L</span></div></div>
        <div class="card"><div class="k">總洗井體積（3 倍）</div><div class="v v3" id="pv3">— <span class="u">L</span></div></div>
      </div>
      <div class="warn" id="warn"></div>
    </section>

    <section class="panel">
      <div class="wellBox">
        <div class="wellTitle">直式井身圖</div>
        <div class="wellWrap" id="wellWrap">
          <div class="wellLine"></div>
          <div class="water" id="waterArea"></div>
          <div class="screen" id="screenArea"></div>
          <div class="sampleLine" id="sampleLine"></div>

          <div class="marker" id="topMark" style="top:20px">井口 0.0 m</div>
          <div class="marker waterLbl" id="waterMark">水位 —</div>
          <div class="marker screenLbl" id="screenTopMark">井篩上緣 —</div>
          <div class="marker sampleLbl" id="sampleMark">採樣深度 —</div>
          <div class="marker screenLbl" id="screenBottomMark">井篩下緣 —</div>
          <div class="marker bottomLbl" id="bottomMark">井底 —</div>
        </div>
      </div>
    </section>
  </section>

  <section class="panel">
    <h2>摘要</h2>
    <div class="summary" id="summary">輸入資料後，自動產生地下水採樣摘要。</div>
  </section>
</main>

<script>
const $=id=>document.getElementById(id);
let dia=2;
const rate={2:2,4:8.1};
function n(id){return parseFloat($(id).value)}
function ok(x){return Number.isFinite(x)&&x>=0}
function f1(x){return Number.isFinite(x)?(Math.round(x*10)/10).toFixed(1):"—"}
function setVal(id,val,unit){$(id).innerHTML=(Number.isFinite(val)?f1(val):"—")+` <span class="u">${unit}</span>`}
function pct(depth,total){
  if(!Number.isFinite(depth)||!Number.isFinite(total)||total<=0) return null;
  return Math.max(3,Math.min(97,(depth/total)*100));
}
function setMarker(id,top,text){
  const el=$(id); el.textContent=text;
  if(top===null){el.style.display="none"}else{el.style.display="flex";el.style.top=top+"%";}
}
function calc(){
  const wd=n("wellDepth"), wl=n("waterLevel"), st=n("screenTop"), sb=n("screenBottom");
  const validDepth=ok(wd)&&wd>0;
  const wc=(validDepth&&ok(wl))?wd-wl:NaN;
  const sl=(ok(st)&&ok(sb))?sb-st:NaN;
  const sm=(ok(st)&&ok(sb))?(st+sb)/2:NaN;
  const vol=(Number.isFinite(wc)&&wc>0)?wc*rate[dia]:NaN;

  setVal("waterColumn",wc,"m");
  setVal("wellVolume",vol,"L");
  setVal("screenLen",sl,"m");
  setVal("screenMid",sm,"m");
  setVal("pv1",vol,"L");
  setVal("pv2",vol*2,"L");
  setVal("pv05a",vol*0.5,"L");
  setVal("pv05b",vol*0.5,"L");
  setVal("pv3",vol*3,"L");

  let warns=[];
  if(Number.isFinite(wc)&&wc<0) warns.push("水位深度大於井深，請確認資料。");
  if(Number.isFinite(sl)&&sl<0) warns.push("井篩下緣小於井篩上緣，請確認資料。");
  if(Number.isFinite(sm)&&validDepth&&(sm>wd)) warns.push("井篩中點超過井底，請確認井篩位置。");
  $("warn").textContent=warns.join(" ");

  const wp=pct(wl,wd), sp=pct(st,wd), bp=pct(sb,wd), mp=pct(sm,wd);
  setMarker("waterMark",wp, Number.isFinite(wl) ? "水位 "+f1(wl)+" m" : "水位 —");
  setMarker("screenTopMark",sp, Number.isFinite(st) ? "井篩上緣 "+f1(st)+" m" : "井篩上緣 —");
  setMarker("sampleMark",mp, Number.isFinite(sm) ? "採樣深度 "+f1(sm)+" m" : "採樣深度 —");
  setMarker("screenBottomMark",bp, Number.isFinite(sb) ? "井篩下緣 "+f1(sb)+" m" : "井篩下緣 —");
  setMarker("bottomMark", validDepth?97:null, validDepth ? "井底 "+f1(wd)+" m" : "井底 —");

  if(validDepth&&Number.isFinite(wp)){
    $("waterArea").style.display="block";
    $("waterArea").style.top=wp+"%";
    $("waterArea").style.height=(97-wp)+"%";
  }else{$("waterArea").style.display="none";}
  if(validDepth&&Number.isFinite(sp)&&Number.isFinite(bp)){
    $("screenArea").style.display="block";
    $("screenArea").style.top=Math.min(sp,bp)+"%";
    $("screenArea").style.height=Math.max(4,Math.abs(bp-sp))+"%";
  }else{$("screenArea").style.display="none";}
  if(Number.isFinite(mp)){
    $("sampleLine").style.display="block";
    $("sampleLine").style.top=mp+"%";
  }else{$("sampleLine").style.display="none";}

  $("summary").innerHTML =
    `井徑：<b>${dia} 吋</b>｜計算倍率：<b>×${rate[dia]}</b><br>`+
    `水柱高度：<b>${f1(wc)} m</b>｜井水體積：<b>${f1(vol)} L</b><br>`+
    `第一次洗井 2 倍：<b>${f1(vol*2)} L</b>｜第二次 0.5 倍：<b>${f1(vol*.5)} L</b>｜第三次 0.5 倍：<b>${f1(vol*.5)} L</b><br>`+
    `總洗井體積 3 倍：<b>${f1(vol*3)} L</b>｜建議採樣深度：<b>${f1(sm)} m</b>`;
}
$("dia2").onclick=()=>{dia=2;$("dia2").classList.add("active");$("dia4").classList.remove("active");calc();}
$("dia4").onclick=()=>{dia=4;$("dia4").classList.add("active");$("dia2").classList.remove("active");calc();}
["wellDepth","waterLevel","screenTop","screenBottom"].forEach(id=>$(id).addEventListener("input",calc));
$("clearBtn").onclick=()=>{["wellDepth","waterLevel","screenTop","screenBottom"].forEach(id=>$(id).value="");calc();}
calc();
</script>
</body>
</html>
